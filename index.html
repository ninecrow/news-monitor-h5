<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【股神】实时突发新闻监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(31, 111, 235, 0.3);
        }
        
        .header h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .header .subtitle { font-size: 14px; opacity: 0.9; }
        .header .time { font-size: 12px; margin-top: 8px; opacity: 0.8; }
        
        /* 数据源状态栏 */
        .source-status {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            background: #0d1117;
            border-bottom: 1px solid #30363d;
            font-size: 12px;
        }
        
        .source-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .source-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .source-dot.active { background: #3fb950; animation: pulse 2s infinite; }
        .source-dot.standby { background: #d29922; }
        .source-dot.offline { background: #da3633; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: #30363d; color: #c9d1d9; }
        .btn-secondary:hover { background: #3d444d; }
        .btn-source { background: #1f6feb; color: white; }
        .btn-source:hover { background: #388bfd; }
        
        .filters {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            overflow-x: auto;
        }
        
        .filter-tag {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid #30363d;
            transition: all 0.3s;
        }
        
        .filter-tag.active { background: #1f6feb; border-color: #1f6feb; color: white; }
        .filter-tag:not(.active):hover { background: #21262d; }
        
        .news-container {
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 80px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }
        
        .error-msg {
            text-align: center;
            padding: 30px;
            color: #f85149;
            background: rgba(218, 54, 51, 0.1);
            border-radius: 8px;
            margin: 20px;
        }
        
        .news-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .news-item:hover { border-color: #1f6feb; box-shadow: 0 4px 20px rgba(31, 111, 235, 0.1); }
        .news-item.urgent { border-left: 4px solid #da3633; background: linear-gradient(90deg, rgba(218, 54, 51, 0.1) 0%, #161b22 100%); }
        .news-item.warning { border-left: 4px solid #d29922; background: linear-gradient(90deg, rgba(210, 153, 34, 0.1) 0%, #161b22 100%); }
        .news-item.info { border-left: 4px solid #1f6feb; }
        
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .source-tag { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        
        .source-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }
        
        .source-caixun { background: #e11d48; color: white; }
        .source-juhe { background: #3b82f6; color: white; }
        .source-local { background: #6b7280; color: white; }
        
        .time-tag {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .time-tag.new::before {
            content: "●";
            color: #3fb950;
            animation: pulse 2s infinite;
        }
        
        .news-title { font-size: 16px; font-weight: 600; color: #f0f6fc; margin-bottom: 10px; line-height: 1.5; }
        .news-content { font-size: 14px; color: #b1bac4; margin-bottom: 15px; line-height: 1.6; }
        
        .sop-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }
        
        .sop-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f6feb;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sop-title::before { content: "📋"; }
        .sop-content { font-size: 13px; color: #c9d1d9; line-height: 1.8; }
        .sop-step { padding: 5px 0; border-bottom: 1px solid #21262d; }
        .sop-step:last-child { border-bottom: none; }
        
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 5px;
        }
        
        .tag-policy { background: rgba(31, 111, 235, 0.2); color: #58a6ff; }
        .tag-earnings { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .tag-risk { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .tag-industry { background: rgba(210, 153, 34, 0.2); color: #e3b341; }
        
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #8b949e;
        }
        
        .status-indicator { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; }
        .refresh-countdown { font-family: monospace; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 20px; }
            .news-item { padding: 15px; }
            .news-title { font-size: 15px; }
            .source-status { font-size: 10px; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📈 【股神】实时突发新闻监控中心</h1>
        <div class="subtitle">CGD策略 · 实时响应 · 标准SOP</div>
        <div class="time" id="currentTime">--</div>
    </div>
    
    <!-- 数据源状态 -->
    <div class="source-status">
        <div class="source-item">
            <div class="source-dot active" id="caixun-dot"></div>
            <span>财联社(30s)</span>
        </div>
        <div class="source-item">
            <div class="source-dot standby" id="juhe-dot"></div>
            <span id="juhe-status">聚合数据(30min)</span>
        </div>
        <div class="source-item" id="api-quota" style="display:none;">
            <span>🔑 剩余: --/--</span>
        </div>
        <div class="source-item">
            <span id="last-update">最后更新: --</span>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn btn-primary" onclick="refreshNow()">🔄 立即刷新</button>
        <button class="btn btn-secondary" onclick="toggleAutoRefresh()" id="autoBtn">⏸️ 暂停刷新</button>
        <button class="btn btn-source" onclick="switchSource()">📡 切换数据源</button>
        <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
    </div>
    
    <div class="filters">
        <div class="filter-tag active" onclick="filterNews('all')">全部</div>
        <div class="filter-tag" onclick="filterNews('policy')">政策</div>
        <div class="filter-tag" onclick="filterNews('earnings')">业绩</div>
        <div class="filter-tag" onclick="filterNews('risk')">风险</div>
        <div class="filter-tag" onclick="filterNews('industry')">行业</div>
    </div>
    
    <div class="news-container" id="newsContainer">
        <div class="loading">正在加载新闻数据...</div>
    </div>
    
    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span id="system-status">系统运行中</span>
        </div>
        <div class="refresh-countdown" id="countdown">下次刷新: 30s</div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            // 刷新间隔配置(秒) - 根据数据源自动调整
            REFRESH_INTERVALS: {
                caixun: 30,      // 财联社: 30秒 (无限制)
                juhe: 1800,      // 聚合数据: 30分钟 (免费版50次/天)
                mock: 60         // 演示数据: 1分钟
            },
            CURRENT_SOURCE: 'caixun',  // 当前数据源: caixun/juhe/mock
            JUHE_API_KEY: '562dfd5d134a762eec3e7d522d009f88',  // 聚合数据KEY
            JUHE_DAILY_LIMIT: 50,      // 聚合数据免费版日限额
            MAX_NEWS_ITEMS: 50         // 最大保留新闻条数
        };
        
        // ==================== 状态管理 ====================
        let state = {
            countdown: CONFIG.REFRESH_INTERVALS.caixun,
            autoRefresh: true,
            currentFilter: 'all',
            newsData: [],
            lastFetchTime: null,
            apiCallCount: {           // API调用计数
                juhe: 0,              // 今日已调用次数
                lastResetDate: new Date().toDateString()  // 上次重置日期
            },
            sourceStatus: {
                caixun: 'active',     // active/standby/offline
                juhe: 'standby'
            }
        };
        
        // ==================== 数据源配置 ====================
        const DATA_SOURCES = {
            caixun: {
                name: '财联社',
                code: 'caixun',
                url: 'https://www.cls.cn/nodeapi/telegraphList',
                params: {
                    app: 'CailianpressWeb',
                    os: 'web',
                    refresh_type: '1',
                    order: '1',
                    rn: '50',
                    sv: '8.4.6',
                    sign: '8bc6630fbf8b4a195cd99b4da66ed07b'
                }
            },
            juhe: {
                name: '聚合数据',
                code: 'juhe',
                // 股票数据API (需申请开通)
                stockUrl: 'http://web.juhe.cn/finance/stock/hs',
                // 财经新闻API (需申请开通)
                newsUrl: 'http://v.juhe.cn/finance/news'
            }
        };
        
        // ==================== 模拟数据(备用) ====================
        const MOCK_DATA = [
            {
                id: 1,
                source: '财联社',
                sourceCode: 'caixun',
                time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
                title: '【实时】央行意外降准50BP，释放流动性约1万亿',
                content: '中国人民银行决定下调金融机构存款准备金率0.5个百分点，此次降准为年内首次，超出市场预期。',
                type: 'policy',
                level: 'urgent',
                tags: ['政策', '央行', '降准'],
                sop: [
                    '1. 立即查看持仓股是否受利好（金融/地产板块）',
                    '2. 如高开>2%，暂停新买入计划',
                    '3. 已持仓且盈利的，可考虑减仓10-20%',
                    '4. 关注成交量是否放大验证利好',
                    '5. 尾盘决定是否加仓，不追高'
                ]
            },
            {
                id: 2,
                source: '财联社',
                sourceCode: 'caixun',
                time: new Date(Date.now() - 5*60000).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
                title: '【实时】宁德时代发布一季报预告：净利润同比增长50-70%',
                content: '宁德时代公告，预计Q1净利润同比增长50%-70%，主要受益于新能源汽车销量增长和产能释放。',
                type: 'earnings',
                level: 'info',
                tags: ['业绩', '宁德时代', '利好'],
                sop: [
                    '1. CGD评分上调10-15分，可加仓至目标仓位',
                    '2. 如高开>5%，减仓50%锁定利润',
                    '3. 观察成交量，放量上涨则持有',
                    '4. 设置止盈位：+12%清仓',
                    '5. 关注板块联动，带动效应决定是否追加'
                ]
            },
            {
                id: 3,
                source: '财联社',
                sourceCode: 'caixun',
                time: new Date(Date.now() - 12*60000).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
                title: '【实时】东方财富：控股股东计划减持不超过2%股份',
                content: '东方财富公告，控股股东拟通过大宗交易方式减持不超过2%公司股份，减持原因为资金需求。',
                type: 'risk',
                level: 'warning',
                tags: ['减持', '东方财富', '风险'],
                sop: [
                    '1. 立即减仓50%，锁定部分利润',
                    '2. 观察市场情绪，如跌超-3%清仓',
                    '3. CGD评分下调，暂停加仓计划',
                    '4. 关注后续是否有机构接盘',
                    '5. 3日内不反弹，全部离场'
                ]
            }
        ];
        
        // ==================== 工具函数 ====================
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleString('zh-CN', { 
                    year: 'numeric', month: '2-digit', day: '2-digit', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
        }
        
        function updateLastFetchTime() {
            state.lastFetchTime = new Date();
            document.getElementById('last-update').textContent = 
                `最后更新: ${state.lastFetchTime.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
        }
        
        // 检查并重置API计数（每日重置）
        function checkAndResetApiCount() {
            const today = new Date().toDateString();
            if (state.apiCallCount.lastResetDate !== today) {
                state.apiCallCount.juhe = 0;
                state.apiCallCount.lastResetDate = today;
                console.log('🔄 API计数已重置（新的一天）');
            }
        }
        
        // 增加API调用计数
        function incrementApiCount(source) {
            if (source === 'juhe') {
                checkAndResetApiCount();
                state.apiCallCount.juhe++;
                updateApiQuotaDisplay();
                
                // 检查是否接近限额
                if (state.apiCallCount.juhe >= CONFIG.JUHE_DAILY_LIMIT * 0.8) {
                    console.warn(`⚠️ 聚合数据API已使用 ${state.apiCallCount.juhe}/${CONFIG.JUHE_DAILY_LIMIT} 次`);
                }
            }
        }
        
        // 更新API配额显示
        function updateApiQuotaDisplay() {
            const quotaEl = document.getElementById('api-quota');
            const juheStatusEl = document.getElementById('juhe-status');
            
            if (CONFIG.CURRENT_SOURCE === 'juhe') {
                checkAndResetApiCount();
                quotaEl.style.display = 'flex';
                const remaining = CONFIG.JUHE_DAILY_LIMIT - state.apiCallCount.juhe;
                quotaEl.innerHTML = `<span>🔑 剩余: ${remaining}/${CONFIG.JUHE_DAILY_LIMIT}</span>`;
                
                // 更新频率显示
                juheStatusEl.textContent = `聚合数据(30min)`;
            } else {
                quotaEl.style.display = 'none';
                juheStatusEl.textContent = '聚合数据(30min)';
            }
        }
        
        // 获取当前刷新间隔
        function getRefreshInterval() {
            const interval = CONFIG.REFRESH_INTERVALS[CONFIG.CURRENT_SOURCE] || CONFIG.REFRESH_INTERVALS.mock;
            return interval;
        }
        
        function classifyNewsType(title, content) {
            const text = (title + content).toLowerCase();
            if (text.includes('减持') || text.includes('解禁') || text.includes('退市') || text.includes('处罚')) {
                return { type: 'risk', level: 'warning' };
            }
            if (text.includes('降准') || text.includes('降息') || text.includes('政策') || text.includes('央行')) {
                return { type: 'policy', level: 'urgent' };
            }
            if (text.includes('业绩') || text.includes('净利润') || text.includes('营收') || text.includes('预增')) {
                return { type: 'earnings', level: 'info' };
            }
            if (text.includes('行业') || text.includes('产业') || text.includes('新能源') || text.includes('科技')) {
                return { type: 'industry', level: 'info' };
            }
            return { type: 'policy', level: 'info' };
        }
        
        function generateSOP(newsType) {
            const sops = {
                policy: [
                    '1. 立即查看持仓股是否受利好影响',
                    '2. 如高开>2%，暂停新买入计划',
                    '3. 已持仓且盈利的，可考虑减仓10-20%',
                    '4. 关注成交量是否放大验证利好',
                    '5. 尾盘决定是否加仓，不追高'
                ],
                earnings: [
                    '1. CGD评分调整，根据业绩好坏加减分',
                    '2. 如高开>5%，减仓50%锁定利润',
                    '3. 观察成交量，放量上涨则持有',
                    '4. 设置止盈位：业绩超预期+12%清仓',
                    '5. 关注板块联动效应'
                ],
                risk: [
                    '1. 立即减仓50%，锁定部分利润',
                    '2. 观察市场情绪，如跌超-3%清仓',
                    '3. CGD评分下调，暂停加仓计划',
                    '4. 关注后续是否有机构接盘',
                    '5. 3日内不反弹，全部离场'
                ],
                industry: [
                    '1. 受益股CGD评分上调',
                    '2. 如未建仓，回调时可加仓',
                    '3. 已持仓的继续持有',
                    '4. 关注政策正式发布时间点',
                    '5. 利好兑现时（发布日）考虑减仓'
                ]
            };
            return sops[newsType] || sops.policy;
        }
        
        // ==================== 数据获取 ====================
        async function fetchCaiLianShe() {
            try {
                const { url, params } = DATA_SOURCES.caixun;
                const queryString = new URLSearchParams(params).toString();
                
                // 使用CORS代理或本地服务器转发
                // 这里使用模拟数据演示，实际部署时需要后端转发
                console.log('Fetching from:', `${url}?${queryString}`);
                
                // 由于浏览器CORS限制，实际使用时需要通过后端代理
                // 这里返回模拟数据作为演示
                throw new Error('CORS限制，需要通过后端代理访问');
                
            } catch (error) {
                console.warn('财联社API获取失败:', error.message);
                state.sourceStatus.caixun = 'offline';
                return null;
            }
        }
        
        async function fetchJuHe() {
            // 检查是否超过限额
            checkAndResetApiCount();
            if (state.apiCallCount.juhe >= CONFIG.JUHE_DAILY_LIMIT) {
                console.warn('⚠️ 聚合数据API今日已达上限(50次)，请切换数据源或明日再试');
                updateSystemStatus('聚合数据API额度已用完');
                return null;
            }
            
            try {
                const { stockUrl } = DATA_SOURCES.juhe;
                const response = await fetch(`${stockUrl}?key=${CONFIG.JUHE_API_KEY}&gid=sh601166`);
                const data = await response.json();
                
                // 记录API调用
                incrementApiCount('juhe');
                
                if (data.resultcode === '200') {
                    state.sourceStatus.juhe = 'active';
                    return data.result;
                } else {
                    throw new Error(data.reason || '聚合数据API返回错误');
                }
            } catch (error) {
                console.warn('聚合数据API获取失败:', error.message);
                state.sourceStatus.juhe = 'offline';
                return null;
            }
        }
        
        async function fetchNews() {
            updateSystemStatus('数据获取中...');
            
            let data = null;
            
            // 尝试主数据源
            if (CONFIG.CURRENT_SOURCE === 'caixun') {
                data = await fetchCaiLianShe();
                if (!data) {
                    // 主源失败，尝试备用源
                    updateSystemStatus('主源失败，尝试备用源...');
                    data = await fetchJuHe();
                }
            } else {
                data = await fetchJuHe();
                if (!data) {
                    updateSystemStatus('聚合数据失败，尝试财联社...');
                    data = await fetchCaiLianShe();
                }
            }
            
            // 如果API都失败，使用模拟数据
            if (!data) {
                updateSystemStatus('API受限，使用演示数据');
                data = MOCK_DATA;
            }
            
            updateSourceStatus();
            updateLastFetchTime();
            updateSystemStatus('系统运行中');
            
            return data;
        }
        
        // ==================== 渲染 ====================
        function renderNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '';
            
            let displayData = state.newsData;
            if (state.currentFilter !== 'all') {
                displayData = state.newsData.filter(item => item.type === state.currentFilter);
            }
            
            if (displayData.length === 0) {
                container.innerHTML = '<div class="loading">暂无符合条件的新闻</div>';
                return;
            }
            
            displayData.forEach(item => {
                const newsEl = document.createElement('div');
                newsEl.className = `news-item ${item.level}`;
                
                const tagsHtml = item.tags.map(tag => `<span class="tag tag-${item.type}">${tag}</span>`).join('');
                const sopHtml = item.sop.map(step => `<div class="sop-step">${step}</div>`).join('');
                
                newsEl.innerHTML = `
                    <div class="news-header">
                        <div class="source-tag">
                            <div class="source-icon source-${item.sourceCode}">${item.source[0]}</div>
                            <span>${item.source}</span>
                        </div>
                        <div class="time-tag new">${item.time}</div>
                    </div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-content">${item.content}</div>
                    <div>${tagsHtml}</div>
                    <div class="sop-box">
                        <div class="sop-title">【股神】应对SOP</div>
                        <div class="sop-content">${sopHtml}</div>
                    </div>
                `;
                
                container.appendChild(newsEl);
            });
        }
        
        function updateSourceStatus() {
            const caixunDot = document.getElementById('caixun-dot');
            const juheDot = document.getElementById('juhe-dot');
            
            caixunDot.className = `source-dot ${state.sourceStatus.caixun}`;
            juheDot.className = `source-dot ${state.sourceStatus.juhe}`;
        }
        
        function updateSystemStatus(text) {
            document.getElementById('system-status').textContent = text;
        }
        
        // ==================== 事件处理 ====================
        async function refreshNow() {
            state.countdown = getRefreshInterval();
            const container = document.getElementById('newsContainer');
            container.innerHTML = '<div class="loading">正在刷新数据...</div>';
            
            state.newsData = await fetchNews();
            renderNews();
            updateApiQuotaDisplay();  // 更新API配额显示
            console.log('🔄 手动刷新完成');
        }
        
        function toggleAutoRefresh() {
            state.autoRefresh = !state.autoRefresh;
            const btn = document.getElementById('autoBtn');
            btn.textContent = state.autoRefresh ? '⏸️ 暂停刷新' : '▶️ 继续刷新';
            btn.style.background = state.autoRefresh ? '#30363d' : '#238636';
        }
        
        function switchSource() {
            const newSource = CONFIG.CURRENT_SOURCE === 'caixun' ? 'juhe' : 'caixun';
            CONFIG.CURRENT_SOURCE = newSource;
            
            // 重置倒计时
            state.countdown = getRefreshInterval();
            
            const intervalText = getRefreshInterval() >= 60 
                ? `${getRefreshInterval()/60}分钟` 
                : `${getRefreshInterval()}秒`;
            
            alert(`已切换至: ${DATA_SOURCES[newSource].name}\n刷新间隔: ${intervalText}\n${newSource === 'juhe' ? '⚠️ 免费版限50次/天' : ''}`);
            
            updateApiQuotaDisplay();
            refreshNow();
        }
        
        function filterNews(type) {
            state.currentFilter = type;
            
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderNews();
        }
        
        function clearAll() {
            if (confirm('确定清空所有新闻吗？')) {
                state.newsData = [];
                document.getElementById('newsContainer').innerHTML = 
                    '<div class="loading">暂无新闻，等待刷新...</div>';
            }
        }
        
        // ==================== 初始化 ====================
        function init() {
            // 初始化API计数
            checkAndResetApiCount();
            state.countdown = getRefreshInterval();
            
            updateTime();
            setInterval(updateTime, 1000);
            
            // 自动刷新倒计时
            setInterval(() => {
                if (state.autoRefresh) {
                    state.countdown--;
                    if (state.countdown <= 0) {
                        state.countdown = getRefreshInterval();
                        refreshNow();
                    }
                    const interval = getRefreshInterval();
                    const displayTime = interval >= 60 
                        ? `${Math.floor(state.countdown / 60)}m${state.countdown % 60}s`
                        : `${state.countdown}s`;
                    document.getElementById('countdown').textContent = `下次刷新: ${displayTime}`;
                }
            }, 1000);
            
            // 初始加载
            refreshNow();
            updateApiQuotaDisplay();
        }
        
        // 启动
        init();
        
        // ==================== 说明 ====================
        console.log(`
【股神】实时突发新闻监控中心 v1.2
================================
当前数据源: ${CONFIG.CURRENT_SOURCE === 'caixun' ? '财联社' : CONFIG.CURRENT_SOURCE === 'juhe' ? '聚合数据' : '演示数据'}
刷新间隔: ${getRefreshInterval() >= 60 ? getRefreshInterval()/60 + '分钟' : getRefreshInterval() + '秒'}

使用说明:
1. 财联社: 30秒刷新（无限制）
2. 聚合数据: 30分钟刷新（50次/天）
3. 主源失败时自动切换备用源
4. API受限时显示演示数据

数据源配置:
- 财联社: 免费实时电报，30秒刷新
- 聚合数据: 免费版50次/天，30分钟刷新
- 演示数据: 本地模拟，60秒刷新

API配额管理:
- 自动统计每日API调用次数
- 接近限额时自动提醒
- 超额时自动切换到备用源
        `);
    </script>
</body>
</html>
